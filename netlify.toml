[build]
  command = "npm install && prisma generate && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  DATABASE_URL = "postgresql://postgres.ziqdkazerxdpcedjtuns:Filevault%402026%21@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres"
  NEXTAUTH_SECRET = "jksportshub-secret-key-2026"
  NEXTAUTH_URL = "https://jksportshub.netlify.app"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  included_files = [
    "node_modules/@prisma/client/**",
    "node_modules/.prisma/client/**"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/nextjs-api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "production"
